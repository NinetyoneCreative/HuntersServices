# Hunters Services — static site deploy config
[build]
  publish = "."

# Canonical host redirect: send the apex domain to www (matches canonical URLs).
[[redirects]]
  from = "https://hunterspestcontrol.com/*"
  to = "https://www.hunterspestcontrol.com/:splat"
  status = 301
  force = true

# Security + sensible defaults on every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long cache for fingerprint-stable static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
